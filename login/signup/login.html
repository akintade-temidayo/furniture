<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/0261cb4c11.js" crossorigin="anonymous"></script>
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#708090] flex justify-center items-center min-h-screen">

    <form action="" class="bg-[#EEF2FD] text-[#054C73] shadow-lg p-7 rounded-2xl md:w-[400px]">
        <i class="fa-solid fa-arrow-left text-medium mb-10 hover:text-[#708090] hover:text-bold cursor-pointer"></i>

        <div class="flex flex-col mb-7">
            <h4 class="text-[40px] font-medium">Log in</h4>
            <p class="font-sm text-[14px]">Don't have an account? 
                <a href="./signup.html" class="hover:text-[#708090]"><u>create account</u></a>
            </p>
        </div>

        <!-- input 1 -->
        <div class="flex flex-col mb-4">
            <label for="input">Email Address</label>
            <input type="email" placeholder="name@email.com" class="bg-[#EEF2FD] backdrop-blur-md py-2 px-3 border-[1.5px] border-[#054C73] rounded-3xl
            focus:outline hover:border-[#708090]">
        </div>

        <!-- input 2 -->
        <div class="flex flex-col mb-7">
            <label for="input">Email Password</label>
            <input type="password" placeholder="*********" class="bg-[#EEF2FD] backdrop-blur-md p-2 border-[1.5px] border-[#054C73] rounded-3xl
            focus:outline hover:border-[#708090]">
            <p class="text-[12px] underline text-right hover:text-[#708090]">
                <a href="#">Forget Password?</a>
            </p>
        </div>


        <div class="flex gap-1 mb-2">
            <input type="radio" name="" id="" class="text-[#054C73] cursor-pointer">
            <label for="radio" class="text-[12px]">
                I agree to the
                <a href="#" class="underline cursor-pointer hover:text-[10px]">
                    Terms & Condition
                </a>
            </label>
        </div>
        <button class="w-full bg-[#708090] p-2 text-[#054C73] mb-5 rounded-2xl border
        hover:bg-[#054C73] hover:text-white hover:font-bold focus:outline hover:border-2 transition-all duration-100">
            Log in
        </button>   

        <div class="relative flex py-5 items-center mb-5">
            <div class="flex-grow border-t border-[#708090]"></div>
            
            <span class="flex-shrink mx-4 text-[#708090] text-sm">or</span>
            
            <div class="flex-grow border-t border-[#708090]"></div>
        </div>

        <div class="grid md:grid-cols-2 gap-2">
            <button class="flex gap-1 bg-[#EEF2FD] backdrop-blur-md p-2 border-[1.5px] border-[#054C73] rounded-2xl
            hover:bg-[#708090] hover:text-[#EEF2FD] transition-all">
                <i class="fa-brands fa-google"></i>
                <p class="text-[12px]">Continue with Google</p>
            </button>
            <button class="flex gap-1 bg-[#EEF2FD] backdrop-blur-md p-2 border-[1.5px] border-[#054C73] rounded-2xl
            hover:bg-[#708090] hover:text-[#EEF2FD] transition-all">
                <i class="fa-brands fa-apple"></i>
                <p class="text-[12px]">continue with apple</p>
            </button>
        </div>

    </form>

</body>
</html>
